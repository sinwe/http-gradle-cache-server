buildscript {
    ext {
        springBootVersion = '4.1.0'
        releasePluginVersion = '3.1.0'
        // Only published on the Gradle Plugin Portal, not Maven Central - see plugins{} block below
        owaspPluginVersion = '12.2.2'
    }
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath "org.springframework.boot:spring-boot-gradle-plugin:$springBootVersion"
        classpath "net.researchgate:gradle-release:$releasePluginVersion"
    }
}

plugins {
    id 'net.researchgate.release' version "$releasePluginVersion"
    id 'java'
    id 'org.springframework.boot' version "$springBootVersion"
    id 'org.owasp.dependencycheck' version "$owaspPluginVersion"
}

apply plugin: 'java'
apply plugin: 'eclipse'
apply plugin: 'org.springframework.boot'
apply plugin: 'io.spring.dependency-management'
apply plugin: 'maven-publish'
apply plugin: 'java-library'

group = 'com.github.sinwe.gradle.caching'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

dependencyManagement {
    dependencies {
        // Override Spring Boot's managed logback version, which is vulnerable to expression injection
        dependency 'ch.qos.logback:logback-core:1.5.36'
        dependency 'ch.qos.logback:logback-classic:1.5.36'
    }
}

dependencyCheck {
    nvd {
        // Without a key the NVD API rate-limits almost immediately, failing the analysis
        apiKey = System.getenv('NVD_API_KEY')
    }
    suppressionFile = 'dependency-check-suppressions.xml'
}

dependencies {
    implementation('org.springframework.boot:spring-boot-starter-webflux')
    implementation("org.springframework.boot:spring-boot-devtools")
    implementation("org.springframework.boot:spring-boot-starter-actuator")
    implementation("net.openhft:chronicle-map:2026.1")
    // Provides the HazelcastInstance auto-configuration that builds a client from ClientConfig
    implementation("org.springframework.boot:spring-boot-starter-hazelcast")
    implementation("com.hazelcast:hazelcast:5.7.0")
    testImplementation('org.springframework.boot:spring-boot-starter-test')
    testImplementation('org.springframework.boot:spring-boot-webtestclient')
    testImplementation('io.projectreactor:reactor-test')
}

jar {
    version = "${project.version}"
}

bootJar {
    // Chronicle Map's on-the-fly value-class generation needs access to internal JDK APIs on
    // Java 11+ (see https://chronicle.software/chronicle-support-java-17). These manifest
    // attributes are honoured by the JVM for any jar launched via `java -jar`, so the
    // "persisted" profile works without callers having to pass these flags themselves.
    manifest {
        attributes(
                'Add-Opens'  : 'java.base/java.lang java.base/java.lang.reflect java.base/java.io java.base/java.util jdk.compiler/com.sun.tools.javac',
                'Add-Exports': 'java.base/jdk.internal.ref java.base/sun.nio.ch jdk.unsupported/sun.misc jdk.compiler/com.sun.tools.javac.file'
        )
    }
}

test {
    useJUnitPlatform()
}

publishing {
    publications {
        MyPublication(MavenPublication) {
            from components.java
            groupId = "${project.group}"
            artifactId = "${project.name}"
            version = "${project.version}"
        }
    }
}

release {
    git {
        requireBranch.set('master')
    }
}
